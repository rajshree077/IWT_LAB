<script>
function odd_even(num){
let even=[];
let odd=[];
for(let n of num){
if (n%2==0){
even.push(n);
}
else{
odd.push(n);
}
}
return { even,odd };
}
let a=[3,26,45,54,36,1];
let result = odd_even(a);
document.write("Even numbers:", result.even,"<br>");
document.write("Odd numbers:", result.odd,"</br>");
</script>
