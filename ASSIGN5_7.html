<title>24bcsf53</title>
<script>
let a = [1,2,3,2,4,1,5];
let count = {};
for (let i = 0; i < a.length; i++) {
    let ele = a[i];

    if (count[ele]) {
        count[ele]++;
    } 
    else {
        count[ele] = 1;
    }
}
for (let key in count) {
    document.write(key + " occurs " + count[key] + " times <br>");
}
</script>
