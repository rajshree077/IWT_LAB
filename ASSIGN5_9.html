<script>
  function isArmstrong(num) {
    let sum = 0;
    let temp = num;
    let digits = num.toString().length;
    while (temp > 0) {
      let digit = temp % 10;
      sum += Math.pow(digit, digits);
      temp = Math.floor(temp / 10);
    }
    document.write(num,sum==num?"is Armstrong":"is not Armstrong");
  }
  isArmstrong(153);
</script>
